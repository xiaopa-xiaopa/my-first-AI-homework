<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书推图生成器 - AI驱动的内容创作工具</title>
    <meta name="description" content="智能AI小红书推图生成器，支持图文笔记、数据可视化、清单列表等多种模板，一键生成精美推图">
    <style>
        /* CSS Variables - Design System */
        :root {
            --primary: 346 77% 49%;
            --primary-glow: 346 77% 65%;
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --border: 214.3 31.8% 91.4%;
            --accent: 346 77% 96%;
            --radius: 0.75rem;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--primary-glow)));
            --gradient-subtle: linear-gradient(180deg, hsl(var(--background)), hsl(var(--accent)));
            
            /* Shadows */
            --shadow-elegant: 0 10px 40px -10px hsl(var(--primary) / 0.15);
            --shadow-soft: 0 4px 20px -4px hsl(var(--primary) / 0.1);
            
            /* Transitions */
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffffff 50%, #fef3f5 100%);
            color: hsl(var(--foreground));
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid hsl(var(--border));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-elegant);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: hsl(var(--foreground));
        }

        .logo-text p {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
        }

        /* Main Layout */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: white;
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
            box-shadow: var(--shadow-soft);
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .card:hover {
            box-shadow: var(--shadow-elegant);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid hsl(var(--border));
        }

        .card-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-header p {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Input Section */
        .input-section {
            margin-bottom: 1.5rem;
        }

        .textarea {
            width: 100%;
            min-height: 160px;
            padding: 1rem;
            border: 2px solid hsl(var(--border));
            border-radius: var(--radius);
            font-size: 0.875rem;
            resize: none;
            transition: var(--transition-smooth);
            font-family: inherit;
        }

        .textarea:focus {
            outline: none;
            border-color: hsl(var(--primary));
            box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
        }

        .textarea::placeholder {
            color: hsl(var(--muted-foreground));
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-soft);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-elegant);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: hsl(var(--muted));
            color: hsl(var(--foreground));
        }

        .btn-secondary:hover {
            background: hsl(var(--muted-foreground) / 0.1);
        }

        .btn-full {
            width: 100%;
        }

        /* Template Selector */
        .template-grid {
            display: grid;
            gap: 0.75rem;
        }

        .template-option {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border: 2px solid hsl(var(--border));
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition-smooth);
            text-align: left;
            background: white;
        }

        .template-option:hover {
            border-color: hsl(var(--primary) / 0.5);
            background: hsl(var(--muted));
        }

        .template-option.selected {
            border-color: hsl(var(--primary));
            background: hsl(var(--accent));
            box-shadow: var(--shadow-soft);
        }

        .template-icon {
            width: 48px;
            height: 48px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition-smooth);
        }

        .template-option.selected .template-icon {
            background: hsl(var(--primary));
            color: white;
        }

        .template-option:not(.selected) .template-icon {
            background: hsl(var(--muted));
            color: hsl(var(--muted-foreground));
        }

        .template-info {
            flex: 1;
            min-width: 0;
        }

        .template-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
            transition: var(--transition-smooth);
        }

        .template-option.selected .template-name {
            color: hsl(var(--primary));
        }

        .template-desc {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            line-clamp: 2;
            overflow: hidden;
        }

        .template-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: hsl(var(--primary));
            margin-top: 0.5rem;
            flex-shrink: 0;
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .template-option.selected .template-indicator {
            opacity: 1;
        }

        /* Preview Canvas */
        .preview-container {
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, hsl(var(--muted)) 0%, hsl(var(--muted) / 0.3) 100%);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
        }

        .preview-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: hsl(var(--muted-foreground));
        }

        .preview-placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.2;
        }

        .preview-loading {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid hsl(var(--muted));
            border-top-color: hsl(var(--primary));
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Preview Templates */
        .preview-content {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 1.5rem;
        }

        /* Note Template */
        .note-template {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .note-cover {
            height: 192px;
            background: linear-gradient(135deg, #f472b6, #ef4444, #fb923c);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .note-cover-content {
            text-align: center;
            color: white;
        }

        .note-cover-emoji {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .note-cover-text {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .note-content {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .note-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-body {
            font-size: 0.875rem;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: auto;
        }

        .note-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .note-tag.pink {
            background: #fce7f3;
            color: #db2777;
        }

        .note-tag.purple {
            background: #f3e8ff;
            color: #9333ea;
        }

        .note-tag.blue {
            background: #dbeafe;
            color: #2563eb;
        }

        .note-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
            margin-top: 1rem;
        }

        .note-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .note-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f472b6, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .note-author-name {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .note-stats {
            display: flex;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: #9ca3af;
        }

        /* Chart Template */
        .chart-template {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            padding: 1.5rem;
            color: white;
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .chart-subtitle {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .chart-body {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .chart-bars {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .chart-bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .chart-bar {
            width: 100%;
            border-radius: 0.5rem 0.5rem 0 0;
            transition: all 0.5s ease;
        }

        .chart-bar-label {
            font-size: 0.75rem;
            color: #4b5563;
            font-weight: 500;
        }

        .chart-bar-value {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .chart-summary {
            background: linear-gradient(135deg, #f9fafb, #f3f4f6);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .chart-summary-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .chart-summary-text {
            font-size: 0.75rem;
            color: #4b5563;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .chart-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .chart-stat {
            text-align: center;
            padding: 0.75rem;
            border-radius: 0.5rem;
        }

        .chart-stat.pink {
            background: #fce7f3;
        }

        .chart-stat.purple {
            background: #f3e8ff;
        }

        .chart-stat.blue {
            background: #dbeafe;
        }

        .chart-stat-value {
            font-size: 1.125rem;
            font-weight: 700;
        }

        .chart-stat.pink .chart-stat-value {
            color: #db2777;
        }

        .chart-stat.purple .chart-stat-value {
            color: #9333ea;
        }

        .chart-stat.blue .chart-stat-value {
            color: #2563eb;
        }

        .chart-stat-label {
            font-size: 0.625rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }

        /* List Template */
        .list-template {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .list-header {
            background: linear-gradient(135deg, #14b8a6, #06b6d4, #3b82f6);
            padding: 1.5rem;
            color: white;
        }

        .list-header-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .list-header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .list-header-info h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .list-header-info p {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .list-body {
            flex: 1;
            padding: 1.5rem;
            overflow: auto;
        }

        .list-items {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f9fafb, white);
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            border-color: #d1d5db;
        }

        .list-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .list-item-content {
            flex: 1;
            min-width: 0;
        }

        .list-item-text {
            font-size: 0.875rem;
            color: #374151;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .list-item-progress {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .list-progress-bar {
            flex: 1;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .list-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .list-progress-text {
            font-size: 0.625rem;
            color: #9ca3af;
        }

        .list-cta {
            margin-top: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f0fdfa, #ecfeff);
            border: 1px solid #ccfbf1;
            border-radius: 0.75rem;
            text-align: center;
        }

        .list-cta-text {
            font-size: 0.75rem;
            color: #0d9488;
            font-weight: 500;
        }

        /* Footer */
        .footer {
            border-top: 1px solid hsl(var(--border));
            margin-top: 4rem;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        .footer p {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                padding: 1rem;
            }

            .main-container {
                padding: 1rem;
            }

            .logo-text h1 {
                font-size: 1rem;
            }

            .logo-text p {
                display: none;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>小红书推图生成器</h1>
                    <p>AI驱动的内容创作工具</p>
                </div>
            </div>
            <button class="btn btn-secondary" id="downloadBtn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                下载图片
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- Input Card -->
            <div class="card input-section">
                <div class="card-header">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: hsl(var(--primary));">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        输入内容
                    </h2>
                    <p>描述你想要生成的推图内容，AI将自动为你创作</p>
                </div>
                <div class="card-body">
                    <textarea 
                        class="textarea" 
                        id="contentInput"
                        placeholder="例如：分享一款超好用的护肤产品，质地清爽不油腻，适合油皮使用，价格也很亲民..."
                    ></textarea>
                    <button class="btn btn-primary btn-full" id="generateBtn" style="margin-top: 1rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                        </svg>
                        生成推图
                    </button>
                </div>
            </div>

            <!-- Template Selection Card -->
            <div class="card">
                <div class="card-header">
                    <h2>选择模板款式</h2>
                </div>
                <div class="card-body">
                    <div class="template-grid">
                        <button class="template-option selected" data-template="note">
                            <div class="template-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                            </div>
                            <div class="template-info">
                                <div class="template-name">图文笔记</div>
                                <div class="template-desc">经典的小红书图文排版样式</div>
                            </div>
                            <div class="template-indicator"></div>
                        </button>

                        <button class="template-option" data-template="chart">
                            <div class="template-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                </svg>
                            </div>
                            <div class="template-info">
                                <div class="template-name">数据可视化</div>
                                <div class="template-desc">突出数据和图表的展示样式</div>
                            </div>
                            <div class="template-indicator"></div>
                        </button>

                        <button class="template-option" data-template="list">
                            <div class="template-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                </svg>
                            </div>
                            <div class="template-info">
                                <div class="template-name">清单列表</div>
                                <div class="template-desc">清新简约的清单列表样式</div>
                            </div>
                            <div class="template-indicator"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel - Preview -->
        <div class="right-panel">
            <div class="card">
                <div class="card-header">
                    <h2>实时预览</h2>
                    <p>生成的推图效果预览</p>
                </div>
                <div class="preview-container" id="previewContainer">
                    <div class="preview-placeholder" id="previewPlaceholder">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>输入内容并生成后，预览将显示在这里</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>专为自由创作者和学生打造的智能内容创作工具</p>
    </footer>

    <script>
        // State
        let selectedTemplate = 'note';
        let isGenerating = false;
        let hasGenerated = false;

        // DOM Elements
        const contentInput = document.getElementById('contentInput');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewContainer = document.getElementById('previewContainer');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const templateOptions = document.querySelectorAll('.template-option');

        // Template Selection
        templateOptions.forEach(option => {
            option.addEventListener('click', () => {
                templateOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedTemplate = option.dataset.template;
                
                // If already generated, re-render with new template
                if (hasGenerated && contentInput.value.trim()) {
                    renderPreview(contentInput.value.trim());
                }
            });
        });

        // Generate Button
        generateBtn.addEventListener('click', async () => {
            const content = contentInput.value.trim();
            if (!content || isGenerating) return;

            isGenerating = true;
            generateBtn.disabled = true;
            generateBtn.innerHTML = `
                <div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div>
                生成中...
            `;

            // Show loading
            previewPlaceholder.style.display = 'none';
            previewContainer.innerHTML = `
                <div class="preview-loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem; color: hsl(var(--muted-foreground));">AI正在创作中...</p>
                </div>
            `;

            // Simulate AI generation
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Render preview
            renderPreview(content);
            
            hasGenerated = true;
            isGenerating = false;
            generateBtn.disabled = false;
            downloadBtn.disabled = false;
            generateBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                </svg>
                生成推图
            `;
        });

        // Download Button
        downloadBtn.addEventListener('click', () => {
            alert('在完整版本中，这里会下载生成的图片文件');
        });

        // Render Preview Function
        function renderPreview(content) {
            const title = content.split('\n')[0].slice(0, 30) || '精彩内容';
            const body = content.length > 100 ? content.slice(0, 100) + '...' : content;

            let html = '';

            switch (selectedTemplate) {
                case 'note':
                    html = renderNoteTemplate(title, body);
                    break;
                case 'chart':
                    html = renderChartTemplate(title, body);
                    break;
                case 'list':
                    html = renderListTemplate(title, content);
                    break;
            }

            previewContainer.innerHTML = `<div class="preview-content fade-in">${html}</div>`;
        }

        // Note Template Renderer
        function renderNoteTemplate(title, body) {
            return `
                <div class="note-template">
                    <div class="note-cover">
                        <div class="note-cover-content">
                            <div class="note-cover-emoji">✨</div>
                            <div class="note-cover-text">精美封面</div>
                        </div>
                    </div>
                    <div class="note-content">
                        <h2 class="note-title">${escapeHtml(title)}</h2>
                        <p class="note-body">${escapeHtml(body)}</p>
                        <div class="note-tags">
                            <span class="note-tag pink">#推荐</span>
                            <span class="note-tag purple">#分享</span>
                            <span class="note-tag blue">#好物</span>
                        </div>
                        <div class="note-footer">
                            <div class="note-author">
                                <div class="note-avatar">U</div>
                                <span class="note-author-name">创作者</span>
                            </div>
                            <div class="note-stats">
                                <span>❤️ 1.2k</span>
                                <span>💬 89</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Chart Template Renderer
        function renderChartTemplate(title, body) {
            const bars = [
                { label: '指标A', value: 75, color: 'linear-gradient(to top, #f472b6, #ec4899)' },
                { label: '指标B', value: 60, color: 'linear-gradient(to top, #a78bfa, #8b5cf6)' },
                { label: '指标C', value: 85, color: 'linear-gradient(to top, #60a5fa, #3b82f6)' },
                { label: '指标D', value: 45, color: 'linear-gradient(to top, #4ade80, #22c55e)' },
            ];

            return `
                <div class="chart-template">
                    <div class="chart-header">
                        <h2 class="chart-title">${escapeHtml(title)}</h2>
                        <p class="chart-subtitle">数据可视化展示</p>
                    </div>
                    <div class="chart-body">
                        <div class="chart-bars">
                            ${bars.map(bar => `
                                <div class="chart-bar-item">
                                    <div class="chart-bar" style="height: ${bar.value * 2}px; background: ${bar.color};"></div>
                                    <span class="chart-bar-label">${bar.label}</span>
                                    <span class="chart-bar-value">${bar.value}%</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="chart-summary">
                            <h3 class="chart-summary-title">核心洞察</h3>
                            <p class="chart-summary-text">${escapeHtml(body)}</p>
                        </div>
                        <div class="chart-stats">
                            <div class="chart-stat pink">
                                <div class="chart-stat-value">+45%</div>
                                <div class="chart-stat-label">增长率</div>
                            </div>
                            <div class="chart-stat purple">
                                <div class="chart-stat-value">2.3k</div>
                                <div class="chart-stat-label">总用户</div>
                            </div>
                            <div class="chart-stat blue">
                                <div class="chart-stat-value">98%</div>
                                <div class="chart-stat-label">满意度</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // List Template Renderer
        function renderListTemplate(title, content) {
            const items = content
                .split(/[。,\n]/)
                .filter(item => item.trim().length > 0)
                .slice(0, 5)
                .map(item => item.trim());

            const listItems = items.length > 0 ? items : ['优质内容推荐'];
            const icons = ['🌟', '✨', '💫', '⭐', '🎯'];
            const colors = [
                'linear-gradient(135deg, #f472b6, #ec4899)',
                'linear-gradient(135deg, #a78bfa, #8b5cf6)',
                'linear-gradient(135deg, #60a5fa, #3b82f6)',
                'linear-gradient(135deg, #4ade80, #22c55e)',
                'linear-gradient(135deg, #fb923c, #f97316)',
            ];

            return `
                <div class="list-template">
                    <div class="list-header">
                        <div class="list-header-content">
                            <div class="list-header-icon">📝</div>
                            <div class="list-header-info">
                                <h2>${escapeHtml(title)}</h2>
                                <p>${listItems.length} 个精选要点</p>
                            </div>
                        </div>
                    </div>
                    <div class="list-body">
                        <div class="list-items">
                            ${listItems.map((item, index) => `
                                <div class="list-item">
                                    <div class="list-item-icon" style="background: ${colors[index % colors.length]};">
                                        ${icons[index % icons.length]}
                                    </div>
                                    <div class="list-item-content">
                                        <p class="list-item-text">${escapeHtml(item)}</p>
                                        <div class="list-item-progress">
                                            <div class="list-progress-bar">
                                                <div class="list-progress-fill" style="width: ${100 - index * 15}%; background: ${colors[index % colors.length]};"></div>
                                            </div>
                                            <span class="list-progress-text">${100 - index * 15}%</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="list-cta">
                            <p class="list-cta-text">💡 收藏这份清单，随时查看</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Input validation
        contentInput.addEventListener('input', () => {
            const hasContent = contentInput.value.trim().length > 0;
            generateBtn.disabled = !hasContent || isGenerating;
        });
    </script>
</body>
</html>
